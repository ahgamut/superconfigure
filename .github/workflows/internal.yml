on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The full commit SHA to run the workflow on'
        required: true
        type: string

name: Release internal
jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        result: [lang, compress, web, aarch64-gcc, x86_64-gcc, cli, editor, llvm]
    name: ${{ matrix.result }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@master
        with:
          ref: ${{ github.event.inputs.commit_sha }}
      - name: support ape bins and SSL things
        run: bash ./.github/scripts/setup
      - name: build Cosmo
        run: bash ./.github/scripts/cosmo
      - name: build ${{ matrix.result }}
        env:
          COLLECTION: yes
        run: bash ./.github/scripts/collectbuild ${{ matrix.result }}
      - name: collect into zip
        env:
          ZFILENAME: ${{ matrix.result }}
        run: bash ./.github/scripts/collectzip
      - name: Upload zip
        uses: actions/upload-artifact@v7
        with:
          files: "${{ matrix.result }}.zip"
          retention-days: 2
          archive: false
